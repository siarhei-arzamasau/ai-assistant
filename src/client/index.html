<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claude Chat</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header-inner">
        <div class="logo">
          <svg class="logo-icon" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
          </svg>
          <span>Claude</span>
        </div>
        <div class="header-actions">
          <button id="settingsBtn" class="btn-icon" aria-label="Settings" aria-expanded="false">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="3"/>
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
            </svg>
          </button>
          <button id="clearBtn" class="btn-new">New chat</button>
        </div>
      </div>
    </header>

    <div id="settingsPanel" class="settings-panel">
      <div class="settings-inner">
        <div class="setting-item setting-item--model">
          <div class="setting-label"><span>Model</span></div>
          <select id="modelSelect" class="setting-select">
            <option value="claude-haiku-4-5-20251001">Claude Haiku 4.5</option>
            <option value="claude-sonnet-4-6" selected>Claude Sonnet 4.6</option>
            <option value="claude-opus-4-8">Claude Opus 4.8</option>
          </select>
        </div>
        <div class="setting-item">
          <div class="setting-label">
            <span>Max tokens</span>
            <span id="maxTokensVal" class="setting-val">16000</span>
          </div>
          <input type="range" id="maxTokens" class="setting-range" min="100" max="16000" step="100" value="16000">
        </div>
        <div class="setting-item">
          <div class="setting-label">
            <span>Temperature</span>
            <span id="tempVal" class="setting-val">1.00</span>
          </div>
          <input type="range" id="temperature" class="setting-range" min="0" max="1" step="0.05" value="1">
          <div id="tempHint" class="setting-hint setting-hint--below">1.0 = thinking on</div>
        </div>
        <div class="setting-item setting-item--wide">
          <div class="setting-label">
            <span>Stop sequences</span>
            <span class="setting-hint">comma-separated</span>
          </div>
          <input type="text" id="stopSeqs" class="setting-text" placeholder="e.g. END, STOP">
        </div>
      </div>
    </div>

    <main class="main">
      <div id="messages" class="messages">
        <div id="welcome" class="welcome">
          <div class="welcome-glyph">&#9670;</div>
          <h1>How can I help you today?</h1>
          <p>Powered by Claude Opus 4 via the Anthropic API</p>
        </div>
      </div>
    </main>

    <footer class="footer">
      <div class="input-shell">
        <textarea
          id="userInput"
          class="input"
          placeholder="Message Claude…"
          rows="1"
          autofocus
        ></textarea>
        <button id="sendBtn" class="btn-send" disabled aria-label="Send">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="19" x2="12" y2="5"/>
            <polyline points="5 12 12 5 19 12"/>
          </svg>
        </button>
      </div>
      <p class="footer-note">Claude can make mistakes. Verify important information.</p>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
